name: patient_app
description: OrdoGo - Medicine delivery at doorstep
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Network
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  google_maps_flutter: ^2.9.0
  
  # Image
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0
  
  # Notifications (disabled for web compatibility)
  # firebase_core: ^2.24.0
  # firebase_messaging: ^14.7.6
  
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.2
  flutter_dotenv: ^5.1.0
  razorpay_flutter: ^1.3.6
  intl_phone_field: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo1_flat.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - .env
