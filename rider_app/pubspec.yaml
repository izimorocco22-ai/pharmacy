name: rider_app
description: OrdoGo - Medicine delivery at doorstep
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.1
  http: ^1.1.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  intl: ^0.20.2
  url_launcher: ^6.2.2
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.5
  http_parser: ^4.0.2
  google_maps_flutter: ^2.9.0
  flutter_polyline_points: ^2.1.0
  intl_phone_field: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo1.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
